<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Babysitter</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <header>
        <h1>Book a Babysitter</h1>
        <nav>
    <a href="index.html" class="nav-link">Home</a>
    <a href="services.html" class="nav-link">Services</a>
    <a href="order.html" class="nav-link">Order Now</a>
    <a href="about.html" class="nav-link">About</a>
</nav>
    </header>

    <main>
        <section class="order-form-section fade-in">
            <h2>Fill the Form Below</h2>
            <form id="orderForm">
                <!-- User Details -->
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <!-- Babysitter Options -->
                <div class="form-group">
                    <label for="babysitter">Select Babysitter:</label>
                    <select id="babysitter" name="babysitter" required>
                        <option value="">--Choose--</option>
                        <option value="alice">Alice</option>
                        <option value="beth">Beth</option>
                        <option value="carol">Carol</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="hours">Number of Hours:</label>
                    <input type="number" id="hours" name="hours" min="1" max="12" required>
                </div>

                <!-- Payment Method -->
                <div class="form-group">
                    <label for="paymentMethod">Payment Method:</label>
                    <select id="paymentMethod" name="paymentMethod" required>
                        <option value="">--Choose--</option>
                        <option value="btc">Bitcoin (BTC)</option>
                        <option value="giftcard">Gift Card</option>
                    </select>
                </div>

                <!-- Payment Placeholder -->
                <div id="paymentDetails" style="margin-top:1rem;">
                    <!-- BTC or Gift Card details will appear here -->
                </div>

                <button type="submit" class="btn">Submit Order</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 BabySitter Service. All rights reserved.</p>
    </footer>

    <script src="js/payment.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
